repos:
  # Ruff — lint + format (mirrors CI lint job)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy — strict type checking enforced in CI (ci.yml), not pre-commit
  # Pre-commit mypy on partial file sets produces false positives from
  # transitive imports. Full-repo mypy runs in CI instead.
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.19.0
  #   hooks:
  #     - id: mypy

  # Security — bandit (mirrors CI security job, HIGH+ only)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -ll]
        additional_dependencies: ["bandit[toml]"]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^infrastructure/helm/
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # SHOP-001 — RFC #244 licensing enforcement gate.
  # Every agent runner with an async entry point (run/execute) must have
  # @enforced(...) applied. Ruff has no native custom-rule plugin API,
  # so this is a local pre-commit script instead. Scoped to runner.py
  # files touched by the current commit so existing unenforced runners
  # don't block unrelated work — PR-5 (#268) applies the codemod that
  # clears the backlog, then this gate becomes full-repo mandatory.
  - repo: local
    hooks:
      - id: shop-001-enforced-runners
        name: SHOP-001 — agent runners must be @enforced (RFC #244)
        entry: python3 scripts/lint/shop_001_enforced_runners.py --files
        language: system
        files: ^src/shieldops/agents/.*/runner\.py$
        pass_filenames: true
