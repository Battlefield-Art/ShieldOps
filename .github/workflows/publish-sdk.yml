name: Publish SDK to PyPI

on:
  push:
    tags: ["sdk-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install SDK with dev dependencies
        run: |
          cd src/shieldops/sdk
          pip install -e ".[dev]"
      - name: Lint
        run: |
          cd src/shieldops/sdk
          ruff check .
          ruff format --check .
      - name: Run SDK tests
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/unit/test_sdk_interceptor.py -v --tb=short

  build:
    name: Build SDK package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hatch
        run: pip install hatch
      - name: Build sdist and wheel
        run: |
          cd src/shieldops/sdk
          hatch build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: src/shieldops/sdk/dist/
          retention-days: 5

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shieldops-sdk/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
