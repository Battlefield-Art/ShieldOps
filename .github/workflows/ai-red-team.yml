name: AI Red Team Assessment

on:
  pull_request:
    paths:
      - 'src/shieldops/agents/**/prompts.py'
      - 'src/shieldops/agents/**/tools.py'
      - 'src/shieldops/sdk/**'
  workflow_dispatch:
    inputs:
      target_agents:
        description: 'Comma-separated agent IDs to test'
        required: false
      attack_depth:
        description: 'Attack depth: quick/standard/deep'
        default: 'quick'

permissions:
  contents: read
  pull-requests: write

jobs:
  red-team:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run AI red team assessment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RED_TEAM_MODE: ci
        run: |
          python -m shieldops.integrations.ci_cd.red_team_hook \
            --target="${{ inputs.target_agents || 'all' }}" \
            --depth="${{ inputs.attack_depth || 'quick' }}" \
            --output=reports/ \
            --max-critical=0 \
            --max-high=3

      - name: Upload red team report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: red-team-report
          path: reports/red-team-*.json
          retention-days: 30

      - name: Run security gate
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import asyncio
          from shieldops.integrations.ci_cd.security_gate import SecurityGate
          gate = SecurityGate(checks=['prompt_injection', 'credential_scan'])
          result = asyncio.run(gate.run_all_checks({'event': 'pull_request'}))
          if not result['passed']:
              print('Security gate FAILED:')
              print(result['summary'])
              exit(1)
          print('Security gate passed.')
          "
