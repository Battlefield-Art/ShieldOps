name: SDK Publish to PyPI

on:
  push:
    tags: ["sdk-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

concurrency:
  group: sdk-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint & Test SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install SDK with dev dependencies
        run: |
          cd sdk
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          cd sdk
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Run tests
        run: |
          cd sdk
          python -m pytest tests/ -v --tb=short

  build:
    name: Build SDK package
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install hatch
      - name: Build sdist and wheel
        run: |
          cd sdk
          hatch build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/
          retention-days: 5

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/shieldops-sdk/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Requires PYPI_API_TOKEN secret configured in the 'pypi' environment,
          # or trusted publishing (OIDC) configured on PyPI for this repository.
