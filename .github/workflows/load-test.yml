name: Load Test

# Manual-trigger workflow for running k6 load tests against a chosen
# environment. Reserved for on-demand SLO validation and nightly schedules;
# do NOT attach to PR events (30m+ runs are too expensive for every push).
#
# Issue #223 — load testing + chaos engineering.

on:
  workflow_dispatch:
    inputs:
      script:
        description: "k6 script to run"
        required: true
        default: "api_load.js"
        type: choice
        options:
          - api_load.js
          - agent_concurrent.js
          - ingestion_throughput.js
          - smoke-test.js
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      target_rps:
        description: "Target RPS (api_load.js only)"
        required: false
        default: "1000"
      duration:
        description: "Test duration (e.g., 5m, 30m)"
        required: false
        default: "10m"
      concurrency:
        description: "Agent concurrency (agent_concurrent.js only)"
        required: false
        default: "100"
      target_gb_per_day:
        description: "Ingestion target GB/day (ingestion_throughput.js only)"
        required: false
        default: "10"
  schedule:
    # Nightly smoke test at 03:00 UTC
    - cron: "0 3 * * *"

concurrency:
  group: load-test-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  load-test:
    name: k6 ${{ github.event.inputs.script || 'smoke-test.js' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version

      - name: Run k6 load test
        env:
          API_URL: ${{ secrets.LOAD_TEST_API_URL }}
          TEST_EMAIL: ${{ secrets.LOAD_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.LOAD_TEST_PASSWORD }}
          TARGET_RPS: ${{ github.event.inputs.target_rps || '1000' }}
          DURATION: ${{ github.event.inputs.duration || '10m' }}
          CONCURRENCY: ${{ github.event.inputs.concurrency || '100' }}
          TARGET_GB_PER_DAY: ${{ github.event.inputs.target_gb_per_day || '10' }}
        run: |
          SCRIPT="${{ github.event.inputs.script || 'smoke-test.js' }}"
          mkdir -p results
          k6 run "tests/load/${SCRIPT}" \
            --summary-export=results/summary.json \
            --out json=results/metrics.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-${{ github.event.inputs.script || 'smoke-test.js' }}-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: Check SLO gates
        if: always()
        run: |
          if [ -f results/summary.json ]; then
            echo "## Load Test Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            jq '.metrics | {
              http_reqs: .http_reqs.rate,
              p95: .http_req_duration["p(95)"],
              p99: .http_req_duration["p(99)"],
              error_rate: .http_req_failed.rate
            }' results/summary.json >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
