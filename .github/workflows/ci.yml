name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-cached
        with:
          install-args: ".[dev]"
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    # mypy is informational while we burn down ~4.6k pre-existing type errors
    # concentrated in agents/, security/, analytics/, observability/ packages.
    # Local mypy still runs strictly; this keeps CI moving while we fix drift.
    # TODO(typecheck-drift): tighten once agent/engine drift is burned down.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-cached
        with:
          install-args: ".[dev]"
      - run: mypy src/shieldops/ || true

  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shieldops_test
          POSTGRES_USER: shieldops
          POSTGRES_PASSWORD: shieldops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-cached
        with:
          install-args: ".[dev,dashboard]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          SHIELDOPS_DATABASE_URL: postgresql+asyncpg://shieldops:shieldops@localhost:5432/shieldops_test

      - name: Run tests with coverage
        run: >-
          pytest tests/ -v
          --cov=src/shieldops
          --cov-report=xml
          --cov-fail-under=80
          --junitxml=junit.xml
        env:
          SHIELDOPS_DATABASE_URL: postgresql+asyncpg://shieldops:shieldops@localhost:5432/shieldops_test
          SHIELDOPS_REDIS_URL: redis://localhost:6379/0
          SHIELDOPS_ENVIRONMENT: test
          SHIELDOPS_RATE_LIMIT_ENABLED: "false"

      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: junit.xml
          check_name: Test Results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: github.event_name == 'push'
        with:
          file: coverage.xml

      - name: Run AI Security unit tests
        run: |
          python3 -m pytest tests/unit/test_agent_behavioral_firewall.py \
            tests/unit/test_agent_kill_switch.py \
            tests/unit/test_agent_session_revoker.py \
            tests/unit/test_jit_credential_issuer.py \
            tests/unit/test_credential_policy_engine.py \
            tests/unit/test_mcp_config_auditor.py \
            tests/unit/test_mcp_dependency_scanner.py \
            tests/unit/test_mcp_permission_analyzer.py \
            tests/unit/test_soc_evidence_chain.py \
            tests/unit/test_response_approval_workflow.py \
            tests/unit/test_nhi_registry_engine.py \
            tests/unit/test_shadow_ai_discovery.py \
            tests/unit/test_mcp_security_gateway.py \
            -v --tb=short

      - name: Run AI Security integration tests
        run: |
          python3 -m pytest tests/integration/test_agent_firewall_graph.py \
            tests/integration/test_nhi_registry_graph.py \
            tests/integration/test_mcp_security_graph.py \
            tests/integration/test_soc_brain_graph.py \
            -v --tb=short

      - name: Security gate check
        run: |
          python3 -c "
          from shieldops.integrations.ci_cd.security_gate import SecurityGate
          gate = SecurityGate(checks=['prompt_injection', 'credential_scan'])
          result = gate.run_all_checks({'source_dirs': ['src/shieldops/']})
          if not result['passed']:
              print('Security gate FAILED')
              for r in result['results']:
                  if not r.get('passed', True):
                      print(f'  FAIL: {r[\"check\"]}: {r.get(\"summary\", \"\")}')
              exit(1)
          print('Security gate PASSED')
          "

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

      - name: Verify dashboard build (includes AI Security pages)
        run: npx vite build

  e2e:
    needs: [test, frontend]
    runs-on: ubuntu-latest
    continue-on-error: true  # E2E tests are informational while CI stabilizes
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shieldops_test
          POSTGRES_USER: shieldops
          POSTGRES_PASSWORD: shieldops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-cached
        with:
          install-args: ".[dev,dashboard]"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: dashboard-ui

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: dashboard-ui

      - name: Run database migrations
        run: alembic upgrade head
        env:
          SHIELDOPS_DATABASE_URL: postgresql+asyncpg://shieldops:shieldops@localhost:5432/shieldops_test

      - name: Start API server
        run: |
          uvicorn shieldops.api.app:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
        env:
          SHIELDOPS_DATABASE_URL: postgresql+asyncpg://shieldops:shieldops@localhost:5432/shieldops_test
          SHIELDOPS_REDIS_URL: redis://localhost:6379/0
          SHIELDOPS_ENVIRONMENT: test
          SHIELDOPS_OPA_ENDPOINT: http://localhost:8181

      - name: Run E2E tests
        run: npx playwright test
        working-directory: dashboard-ui
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: dashboard-ui/playwright-report/
          retention-days: 7

  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [aws, gcp, azure]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive infrastructure/terraform/${{ matrix.provider }}

      - name: Terraform init
        run: terraform -chdir=infrastructure/terraform/${{ matrix.provider }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform/${{ matrix.provider }} validate

  terraform-plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [aws, gcp, azure]
    defaults:
      run:
        working-directory: infrastructure/terraform/${{ matrix.provider }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7"
      - name: Terraform Init (no backend)
        run: terraform init -backend=false
      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
        env:
          TF_VAR_environment: ci

  opa-policy-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Validate Rego policies
        run: |
          # Download OPA binary for policy validation
          curl -fsSL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          # Check all policy files parse correctly
          for f in playbooks/policies/*.rego; do
            echo "Checking $f..."
            ./opa check "$f"
          done

      - name: Generate OPA ConfigMap
        run: |
          kubectl create configmap shieldops-opa-policies \
            --from-file=playbooks/policies/ \
            -n shieldops \
            --dry-run=client -o yaml \
            > infrastructure/kubernetes/opa-policies-configmap.yaml
          echo "Generated ConfigMap with $(ls playbooks/policies/*.rego | wc -l) policy files"

      - name: Upload ConfigMap artifact
        uses: actions/upload-artifact@v7
        with:
          name: opa-policies-configmap
          path: infrastructure/kubernetes/opa-policies-configmap.yaml
          retention-days: 30

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-python-cached
        with:
          install-args: ".[dev]"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit security scan (HIGH+ blocks)
        run: bandit -r src/shieldops/ -c pyproject.toml -ll

      - name: Dependency audit
        run: pip-audit
