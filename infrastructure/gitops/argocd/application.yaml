apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shieldops
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: shieldops
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shieldops
  source:
    repoURL: https://github.com/ghantakiran/ShieldOps.git
    targetRevision: main
    path: infrastructure/gitops/kustomize/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: shieldops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/minReplicas
        - /spec/maxReplicas
