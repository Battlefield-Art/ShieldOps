apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shieldops-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  app.kubernetes.io/environment: staging

patches:
  # Scale down to 1 replica for staging
  - target:
      kind: Deployment
      name: shieldops
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Agent firewall in audit mode
  - target:
      kind: Deployment
      name: shieldops-agent-firewall
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: FIREWALL_MODE
          value: "audit"
  # MCP gateway single replica
  - target:
      kind: Deployment
      name: shieldops-mcp-security-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Reduced resource limits for staging
  - target:
      kind: Deployment
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
  # Staging ingress host
  - target:
      kind: Ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.shieldops.io
