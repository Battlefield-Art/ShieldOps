site_name: ShieldOps Documentation
site_description: The Security Control Plane for AI Agents
site_url: https://docs.shieldops.io

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Agent System: architecture/agents.md
    - Connector Layer: architecture/connectors.md
    - Policy Engine: architecture/policy-engine.md
    - Safety Model: architecture/safety-model.md
    - ADR-005 AI Security Control Plane: architecture/adr-005-ai-security-control-plane.md
  - Agents:
    - SRE Core:
      - Investigation Agent: agents/investigation.md
      - Remediation Agent: agents/remediation.md
      - Incident Commander: agents/incident-commander.md
    - Security:
      - Security Agent: agents/security.md
      - Threat Intel Agent: agents/threat-intel.md
      - Risk Scoring Agent: agents/risk-scoring.md
      - Compliance Auditor: agents/compliance-auditor.md
    - AI Security:
      - Agent Firewall: agents/agent-firewall.md
      - NHI Registry: agents/nhi-registry.md
      - MCP Security: agents/mcp-security.md
      - SOC Brain: agents/soc-brain.md
    - Observability:
      - OTel Pipeline Agent: agents/otel-pipeline.md
      - Telemetry Optimizer Agent: agents/telemetry-optimizer.md
    - Automation:
      - Learning Agent: agents/learning.md
      - Supervisor Agent: agents/supervisor.md
      - ChatOps Agent: agents/chatops.md
      - Automation Orchestrator Agent: agents/automation-orchestrator.md
    - Intelligence:
      - Enterprise Integration Agent: agents/enterprise-integration.md
    - Detection & Response:
      - Agentic MDR: agents/agentic-mdr.md
      - Autonomous XDR: agents/autonomous-xdr.md
      - Autonomous SOC: agents/autonomous-soc.md
      - Breakout Defender: agents/breakout-defender.md
    - Data Protection:
      - Data Loss Prevention: agents/data-loss-prevention.md
      - Cyber Recovery: agents/cyber-recovery.md
      - Ransomware Forensics: agents/ransomware-forensics.md
    - Self-Evolution:
      - Agent Evolution: agents/evolution.md
      - Reflection Engine: agents/reflection-engine.md
      - Agent Memory Store: agents/agent-memory-store.md
  - Observability:
    - OTel Pipeline Management: agents/otel-pipeline.md
    - Telemetry Optimization: agents/telemetry-optimizer.md
  - Security Intelligence:
    - Threat Intelligence: agents/threat-intel.md
    - Risk-Based Alerting: agents/risk-scoring.md
    - Compliance Automation: agents/compliance-auditor.md
  - API Reference:
    - Authentication: api/authentication.md
    - Investigations: api/investigations.md
    - Remediations: api/remediations.md
    - Security: api/security.md
    - Agents: api/agents.md
    - Analytics: api/analytics.md
  - Deployment:
    - Local Development: deployment/local.md
    - Kubernetes: deployment/kubernetes.md
    - Helm Chart: deployment/helm.md
    - Multi-Cloud: deployment/multi-cloud.md
  - Contributing:
    - Development Setup: contributing/setup.md
    - Code Style: contributing/code-style.md
    - Testing: contributing/testing.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
